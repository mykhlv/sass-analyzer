name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version consistency
        run: |
          cargo_ver=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          pkg_ver=$(node -p "require('./editors/code/package.json').version")
          if [ "$cargo_ver" != "$pkg_ver" ]; then
            echo "::error::Version mismatch: Cargo.toml=$cargo_ver, package.json=$pkg_ver"
            exit 1
          fi
          echo "Versions in sync: $cargo_ver"

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - working-directory: editors/code
        run: npm ci
      - working-directory: editors/code
        run: npm run lint
      - working-directory: editors/code
        run: npm run build
